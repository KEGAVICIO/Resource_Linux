[colors]
; Fondo transparente para la barra principal
bg-trans = #00000000
; El color de fondo (gris azulado oscuro)
bg-mod = #1E1E2E
; Color del texto principal
fg = #F4E4DC

[bar/main]
width = 100%
height = 35
; Aplicamos el fondo transparente aquГ­
background = ${colors.bg-trans}
foreground = ${colors.fg}
offset-x = 0%
offset-y = 7
module-margin = 0
padding-left = 1
padding-right = 1
override-redirect = false
wm-restack = bspwm

; --- FUENTES ---
font-0 = Hack Nerd Font:style=Regular:pixelsize=13;2
font-1 = Font Awesome 7 Free:style=Solid:pixelsize=15;2
font-2 = Hack Nerd Font:style=Regular:pixelsize=26;4 

; --- ORDEN DE LOS MГ“DULOS ---
modules-left = b-izq profile b-der esp b-izq date b-der esp b-izq vpn b-der
modules-center = b-izq workspaces b-der
modules-right = b-izq memory b-der esp b-izq net b-der esp b-izq volume b-der esp b-izq battery b-der

; =========================================
; MГ“DULOS DE DISEГ‘O (Bordes y Espacios)
; =========================================

[module/b-izq]
type = custom/text
content = "%{T3}о‚є%{T-}"
content-foreground = ${colors.bg-mod}
content-background = ${colors.bg-trans}

[module/b-der]
type = custom/text
content = "%{T3}о‚ј%{T-}"
content-foreground = ${colors.bg-mod}
content-background = ${colors.bg-trans}

[module/esp]
type = custom/text
content = "%{O-10}"
content-background = ${colors.bg-trans}

[module/space]
type = custom/text
content = " "
content-background = ${colors.bg-mod}

; =========================================
; TUS MГ“DULOS ACTUALES (Con fondos aГ±adidos)
; =========================================

[module/workspaces]
type = internal/bspwm
label-focused   = %{T2}пѓ§%{T-}
label-occupied  = %{T2}пѓ§%{T-}
label-empty     = %{T2}пѓ§%{T-}
label-urgent    = %{T2}пѓ§%{T-}

label-separator = "вЂЉ"
label-separator-background = ${colors.bg-mod}

label-focused-padding  = 0
label-occupied-padding = 0
label-empty-padding    = 0
label-urgent-padding   = 0

label-focused-foreground  = #E3E8F5
label-occupied-foreground = #8F3EFF
label-empty-foreground    = #4B2C73
label-urgent-foreground   = #0E0F1A

; ВЎAquГ­ estГЎ la magia para los rayos! Le damos fondo a cada estado
label-focused-background  = ${colors.bg-mod}
label-occupied-background = ${colors.bg-mod}
label-empty-background    = ${colors.bg-mod}
label-urgent-background   = ${colors.bg-mod}

[module/date]
type = internal/date
interval = 1
date = %a %d %b %H:%M
label = %date%
format-background = ${colors.bg-mod}

[module/volume]
type = internal/pulseaudio
sink = @DEFAULT_SINK@
use-ui-max = true
interval = 2

label-volume = %{T2}пЂЁ%{T-}%percentage%%
label-muted  = %{T2}пљ©%{T-} mute
click-right = /bin/bash -lc "$(command -v wpctl >/dev/null 2>&1 && echo 'wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle' || echo 'pactl set-sink-mute @DEFAULT_SINK@ toggle')"

format-volume-background = ${colors.bg-mod}
format-muted-background = ${colors.bg-mod}

[module/battery]
type = internal/battery
battery = BAT0
adapter = ACAD
poll-interval = 5

format-charging    = <label-charging>
format-discharging =  %{T2}<ramp-capacity>%{T-}<label-discharging>
format-full        = <label-full>

format-charging-background = ${colors.bg-mod}
format-discharging-background = ${colors.bg-mod}
format-full-background = ${colors.bg-mod}

label-charging = %{T2}п‡¦%{T-}%percentage%%
label-discharging = %percentage%%
label-full = %{T2}п‰Ђ%{T-}%percentage%%

ramp-capacity-0 = п‰„
ramp-capacity-1 = п‰ѓ
ramp-capacity-2 = п‰‚
ramp-capacity-3 = п‰Ѓ
ramp-capacity-4 = п‰Ђ

[module/profile]
type = custom/text
content = %{A1:/bin/bash -lc "~/.config/polybar/scripts/powermenu.sh":}%{T2}пЂ“%{T-}%{A}
content-foreground = #F4E4DC
content-background = ${colors.bg-mod}

[module/net]
type = custom/script
exec = ~/.config/polybar/scripts/net_status.sh
interval = 5
click-left = ~/.config/polybar/scripts/wifimenu.sh
format-background = ${colors.bg-mod}

[module/vpn]
type = custom/script
exec = ~/.config/polybar/scripts/vpnip.sh
interval = 5
click-left = notify-send "VPN" "Tu IP de la VPN es $(~/.config/polybar/scripts/vpnip.sh)"
format-background = ${colors.bg-mod}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "п”ё "
;format-prefix-foreground = #1793d1
label = %percentage_used%%(%gb_used%)
label-foreground = #F4E4DC
format-background = ${colors.bg-mod}
